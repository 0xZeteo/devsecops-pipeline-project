name: DevSecOps Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-scan:
    needs: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: auto

  iac-scan:
    needs: sast-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./
          framework: terraform
          soft_fail: true

  container-scan:
    needs: iac-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t my-app:latest .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-app:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  notify-slack:
    runs-on: ubuntu-latest
    needs: [secrets-scan, sast-scan, iac-scan, container-scan]
    if: always()
    steps:
      - name: Send Slack notification
        run: |
          curl -X POST ${{ secrets.SLACK_WEB_HOOK }} \
          -H 'Content-Type: application/json' \
          -d '{
            "text": "DevSecOps Security Pipeline Results",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*DevSecOps Security Pipeline Completed*\n\n✅ Gitleaks: ${{ needs.secrets-scan.result }}\n✅ Semgrep: ${{ needs.sast-scan.result }}\n✅ Checkov: ${{ needs.iac-scan.result }}\n✅ Trivy: ${{ needs.container-scan.result }}\n\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Full Results>"
                }
              }
            ]
          }'