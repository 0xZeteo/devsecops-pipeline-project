name: DevSecOps Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-scan:
    needs: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Semgrep
        id: semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
        continue-on-error: true
      - name: Create issue for SAST findings
        if: steps.semgrep.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔴 SAST Security Findings Detected',
              body: `## Semgrep Security Scan Results
              
              **Status:** ❌ Failed
              **Commit:** ${context.sha}
              **Triggered by:** ${context.actor}
              
              Semgrep detected security vulnerabilities in the code.
              
              ### Action Required
              1. Review the [full scan results](${context.payload.repository.html_url}/actions/runs/${context.runId})
              2. Fix the identified vulnerabilities
              3. Re-run the pipeline
              
              **Run Details:** [View Workflow](${context.payload.repository.html_url}/actions/runs/${context.runId})`,
              labels: ['security', 'sast', 'automated']
            })

  iac-scan:
    needs: sast-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./
          framework: terraform
          soft_fail: true
      - name: Create issue for IaC findings
        if: steps.checkov.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔴 Infrastructure Security Issues Detected',
              body: `## Checkov IaC Scan Results
              
              **Status:** ❌ Failed
              **Commit:** ${context.sha}
              **Triggered by:** ${context.actor}
              
              Checkov detected security misconfigurations in infrastructure code.
              
              ### Action Required
              1. Review the [full scan results](${context.payload.repository.html_url}/actions/runs/${context.runId})
              2. Fix the infrastructure misconfigurations
              3. Re-run the pipeline
              
              **Run Details:** [View Workflow](${context.payload.repository.html_url}/actions/runs/${context.runId})`,
              labels: ['security', 'iac', 'automated']
            })

  container-scan:
    needs: iac-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t my-app:latest .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-app:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  notify-slack:
    runs-on: ubuntu-latest
    needs: [secrets-scan, sast-scan, iac-scan, container-scan]
    if: always()
    steps:
      - name: Send Slack notification
        run: |
          curl -X POST ${{ secrets.SLACK_WEB_HOOK }} \
          -H 'Content-Type: application/json' \
          -d '{
            "text": "DevSecOps Security Pipeline Results",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*DevSecOps Security Pipeline Completed*\n\n✅ Gitleaks: ${{ needs.secrets-scan.result }}\n✅ Semgrep: ${{ needs.sast-scan.result }}\n✅ Checkov: ${{ needs.iac-scan.result }}\n✅ Trivy: ${{ needs.container-scan.result }}\n\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Full Results>"
                }
              }
            ]
          }'